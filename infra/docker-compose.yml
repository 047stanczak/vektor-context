services:
  db:
    image: postgres:13
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
     - "5433:5432"
    restart: always

  backend:
    build:
      context: ../backend/
      dockerfile: ../backend/Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PLATFORM: ${DB_PLATFORM}
      DDL_AUTO: ${DDL_AUTO}
      SERVER_TIMEOUT: ${SERVER_TIMEOUT}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ../frontend/
      dockerfile: ../frontend/Dockerfile
    environment:
      API_BASE_URL: ${FRONTEND_API_BASE_URL}
    ports:
      - "80:80" 
    depends_on:
      - backend
    restart: always

volumes:
  db_data:
